<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lykkehjul</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f0fbf4, #eef8ff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  overflow: hidden;
}

.container {
  text-align: center;
  position: relative;
  z-index: 2;
}

canvas {
  border-radius: 50%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  background: white;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #7ed6a7, #8ccff8);
  cursor: pointer;
  font-weight: bold;
  color: #1f2937;
}

button:disabled {
  opacity: 0.7;
  cursor: default;
}

.message {
  margin-top: 18px;
  font-size: 30px;
  font-weight: bold;
  color: #0f766e;
  min-height: 40px;
}

.result {
  margin-top: 8px;
  font-size: 28px;
  font-weight: bold;
  color: #1f2937;
  min-height: 36px;
}

.subtext {
  margin-top: 6px;
  font-size: 15px;
  color: #64748b;
}

#confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <canvas id="wheel" width="500" height="500"></canvas>
  <br>
  <button id="spinBtn" onclick="spin()">Snurr</button>
  <div class="message" id="message"></div>
  <div class="result" id="result"></div>
  <div class="subtext">Alle felt ser like ut, men Victoria blir aldri valgt.</div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const confettiCanvas = document.getElementById("confetti");
const confettiCtx = confettiCanvas.getContext("2d");

const spinBtn = document.getElementById("spinBtn");
const messageEl = document.getElementById("message");
const resultEl = document.getElementById("result");

const names = ["Hanna", "Hans", "Ivar", "Caroline", "Line", "Victoria"];
const allowed = ["Hanna", "Hans", "Ivar", "Caroline", "Line"];

const colors = [
  "#cfeecf",
  "#ffdcb8",
  "#c7e7ff",
  "#f8d2e2",
  "#fff0b8",
  "#d9d4ff"
];

let angle = 0;
let spinning = false;

function resizeConfettiCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfettiCanvas();
window.addEventListener("resize", resizeConfettiCanvas);

function drawWheel() {
  const arc = Math.PI * 2 / names.length;

  for (let i = 0; i < names.length; i++) {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250, 250);
    ctx.arc(250, 250, 250, start, end);
    ctx.fill();

    ctx.save();
    ctx.translate(250, 250);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "#333";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(names[i], 210, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.fillStyle = "#ffffff";
  ctx.arc(250, 250, 28, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.fillStyle = "#94a3b8";
  ctx.arc(250, 250, 8, 0, Math.PI * 2);
  ctx.fill();
}

function drawPointer() {
  ctx.beginPath();
  ctx.fillStyle = "#333";
  ctx.moveTo(250, 8);
  ctx.lineTo(235, 38);
  ctx.lineTo(265, 38);
  ctx.closePath();
  ctx.fill();
}

function render() {
  ctx.clearRect(0, 0, 500, 500);
  drawWheel();
  drawPointer();
}

render();

function playVictorySound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const now = audioCtx.currentTime;

  const notes = [523.25, 659.25, 783.99, 1046.50];

  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(freq, now + i * 0.12);

    gain.gain.setValueAtTime(0.0001, now + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.15, now + i * 0.12 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.12 + 0.22);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.24);
  });
}

const confettiPieces = [];

function launchConfetti() {
  confettiPieces.length = 0;

  for (let i = 0; i < 220; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * confettiCanvas.height * 0.3,
      w: 6 + Math.random() * 8,
      h: 8 + Math.random() * 10,
      dx: -2 + Math.random() * 4,
      dy: 2 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      drot: -0.2 + Math.random() * 0.4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 140 + Math.random() * 40
    });
  }

  animateConfetti();
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

  let alive = 0;

  confettiPieces.forEach(p => {
    if (p.life <= 0) return;

    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.03;
    p.rot += p.drot;
    p.life--;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();

    if (p.y < confettiCanvas.height + 40 && p.life > 0) {
      alive++;
    }
  });

  if (alive > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

function spin() {
  if (spinning) return;

  spinning = true;
  spinBtn.disabled = true;
  messageEl.textContent = "";
  resultEl.textContent = "";

  const winner = allowed[Math.floor(Math.random() * allowed.length)];
  const index = names.indexOf(winner);

  const arc = 2 * Math.PI / names.length;
  const targetAngle = (Math.PI * 3 / 2) - (index * arc) - arc / 2;

  const spins = 5 + Math.random() * 2;
  const finalAngle = spins * 2 * Math.PI + targetAngle;

  const duration = 3500;
  const startTime = performance.now();
  const startAngle = angle;

  function animate(time) {
    let t = (time - startTime) / duration;
    if (t > 1) t = 1;

    const ease = 1 - Math.pow(1 - t, 3);
    angle = startAngle + ease * (finalAngle - startAngle);

    render();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      messageEl.textContent = "Vi har en vinner!";
      resultEl.textContent = winner;
      playVictorySound();
      launchConfetti();
      spinBtn.disabled = false;
      spinning = false;
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
